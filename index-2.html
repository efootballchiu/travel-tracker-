// ========== 匯率 ==========
async function fetchExchangeRate(from, to) {
  try {
    const res = await fetch(`https://open.er-api.com/v6/latest/${from}`);
    const data = await res.json();
    if (data.result === 'success' && data.rates[to]) {
      return { rate: data.rates[to], timestamp: data.time_last_update_unix * 1000 };
    }
  } catch (e) {}
  try {
    const res = await fetch(`https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/${from.toLowerCase()}.json`);
    const data = await res.json();
    if (data[from.toLowerCase()][to.toLowerCase()]) {
      return { rate: data[from.toLowerCase()][to.toLowerCase()], timestamp: Date.now() };
    }
  } catch (e) {}
  return null;
}

function getCurrencySymbol(code) { return CURRENCIES.find(c => c.code === code)?.symbol || code; }
function formatMoney(amount, code, short = false) {
  const sym = getCurrencySymbol(code);
  if (short && Math.abs(amount) >= 10000) return sym + (amount / 1000).toFixed(1) + 'k';
  return sym + Math.round(amount).toLocaleString();
}
function convert(amount, rate) { return (!rate || !rate.rate) ? 0 : amount * rate.rate; }

function calculateBalances(expenses, members) {
  const balances = {};
  members.forEach(m => balances[m.id] = 0);
  expenses.forEach(exp => {
    if (!exp.paidBy || !exp.splitAmong || exp.splitAmong.length === 0) return;
    balances[exp.paidBy] = (balances[exp.paidBy] || 0) + exp.amount;
    const perPerson = exp.amount / exp.splitAmong.length;
    exp.splitAmong.forEach(mid => { balances[mid] = (balances[mid] || 0) - perPerson; });
  });
  return balances;
}

function simplifyTransfers(balances) {
  const creditors = [], debtors = [];
  Object.entries(balances).forEach(([id, bal]) => {
    if (bal > 0.01) creditors.push({ id, amount: bal });
    else if (bal < -0.01) debtors.push({ id, amount: -bal });
  });
  creditors.sort((a, b) => b.amount - a.amount);
  debtors.sort((a, b) => b.amount - a.amount);
  const transfers = [];
  let i = 0, j = 0;
  while (i < debtors.length && j < creditors.length) {
    const amt = Math.min(debtors[i].amount, creditors[j].amount);
    if (amt > 0.01) transfers.push({ from: debtors[i].id, to: creditors[j].id, amount: amt });
    debtors[i].amount -= amt;
    creditors[j].amount -= amt;
    if (debtors[i].amount < 0.01) i++;
    if (creditors[j].amount < 0.01) j++;
  }
  return transfers;
}

// ========== 主 App ==========
function App() {
  const [fbReady, setFbReady] = useState(!!window.__firebase);
  const [tab, setTab] = useState('home');
  const [expenses, setExpenses] = useState([]);
  const [members, setMembers] = useState([]);
  const [settings, setSettings] = useState(DEFAULT_SETTINGS);
  const [currentRate, setCurrentRate] = useState(null);
  const [loading, setLoading] = useState(true);
  const [refreshing, setRefreshing] = useState(false);
  const [online, setOnline] = useState(navigator.onLine);

  useEffect(() => {
    if (fbReady) return;
    const handler = () => setFbReady(true);
    window.addEventListener('firebase-ready', handler);
    return () => window.removeEventListener('firebase-ready', handler);
  }, [fbReady]);

  useEffect(() => {
    const onOnline = () => setOnline(true);
    const onOffline = () => setOnline(false);
    window.addEventListener('online', onOnline);
    window.addEventListener('offline', onOffline);
    return () => {
      window.removeEventListener('online', onOnline);
      window.removeEventListener('offline', onOffline);
    };
  }, []);

  useEffect(() => {
    if (!fbReady) return;
    const { db, doc, collection, onSnapshot } = window.__firebase;
    const expensesRef = collection(db, 'trips', TRIP_ID, 'expenses');
    const membersRef = collection(db, 'trips', TRIP_ID, 'members');
    const settingsDocRef = doc(db, 'trips', TRIP_ID, 'meta', 'settings');

    let loaded = 0;
    const check = () => { loaded++; if (loaded >= 3) setLoading(false); };

    const u1 = onSnapshot(expensesRef, (snap) => {
      const list = [];
      snap.forEach(d => list.push({ id: d.id, ...d.data() }));
      list.sort((a, b) => (b.date || '').localeCompare(a.date || '') || (b.createdAt || 0) - (a.createdAt || 0));
      setExpenses(list);
      if (loaded < 3) check();
    }, (err) => { console.error(err); if (loaded < 3) check(); });

    const u2 = onSnapshot(membersRef, (snap) => {
      const list = [];
      snap.forEach(d => list.push({ id: d.id, ...d.data() }));
      list.sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
      setMembers(list);
      if (loaded < 3) check();
    }, (err) => { console.error(err); if (loaded < 3) check(); });

    const u3 = onSnapshot(settingsDocRef, (snap) => {
      if (snap.exists()) setSettings({ ...DEFAULT_SETTINGS, ...snap.data() });
      if (loaded < 3) check();
    }, (err) => { console.error(err); if (loaded < 3) check(); });

    return () => { u1(); u2(); u3(); };
  }, [fbReady]);

  useEffect(() => {
    if (loading) return;
    refreshRate();
  }, [settings.fromCurrency, settings.toCurrency, loading]);

  const refreshRate = async () => {
    if (settings.fromCurrency === settings.toCurrency) {
      setCurrentRate({ rate: 1, timestamp: Date.now() });
      return;
    }
    setRefreshing(true);
    const r = await fetchExchangeRate(settings.fromCurrency, settings.toCurrency);
    if (r) setCurrentRate(r);
    setRefreshing(false);
  };

  const upsertExpense = async (expense) => {
    const { db, doc, setDoc, collection } = window.__firebase;
    const expensesRef = collection(db, 'trips', TRIP_ID, 'expenses');
    const id = expense.id || (Date.now().toString() + Math.random().toString(36).slice(2, 6));
    const data = { ...expense, createdAt: expense.createdAt || Date.now(), updatedAt: Date.now() };
    delete data.id;
    try { await setDoc(doc(expensesRef, id), data); } catch (e) { alert('儲存失敗：' + e.message); }
  };
  const deleteExpense = async (id) => {
    const { db, doc, deleteDoc, collection } = window.__firebase;
    const expensesRef = collection(db, 'trips', TRIP_ID, 'expenses');
    try { await deleteDoc(doc(expensesRef, id)); } catch (e) {}
  };
  const addMultipleExpenses = async (items) => {
    const { db, doc, setDoc, collection } = window.__firebase;
    const expensesRef = collection(db, 'trips', TRIP_ID, 'expenses');
    try {
      await Promise.all(items.map(item => {
        const id = Date.now().toString() + Math.random().toString(36).slice(2, 6);
        const { id: _, ...data } = item;
        return setDoc(doc(expensesRef, id), { ...data, createdAt: Date.now(), updatedAt: Date.now() });
      }));
    } catch (e) { alert('儲存失敗：' + e.message); }
  };
  const upsertMember = async (member) => {
    const { db, doc, setDoc, collection } = window.__firebase;
    const membersRef = collection(db, 'trips', TRIP_ID, 'members');
    const id = member.id || (Date.now().toString() + Math.random().toString(36).slice(2, 6));
    const data = { ...member, createdAt: member.createdAt || Date.now() };
    delete data.id;
    try { await setDoc(doc(membersRef, id), data); } catch (e) { alert(e.message); }
  };
  const deleteMember = async (id) => {
    const { db, doc, deleteDoc, collection } = window.__firebase;
    const membersRef = collection(db, 'trips', TRIP_ID, 'members');
    try { await deleteDoc(doc(membersRef, id)); } catch (e) {}
  };
  const saveSettings = async (next) => {
    const { db, doc, setDoc } = window.__firebase;
    const ref = doc(db, 'trips', TRIP_ID, 'meta', 'settings');
    try { await setDoc(ref, next); } catch (e) {}
  };

  if (!fbReady || loading) {
    return (
      <div className="h-screen w-full flex items-center justify-center bg-black">
        <div className="flex flex-col items-center gap-3">
          <IconLoader className="w-8 h-8 animate-spin text-orange-500" />
          <div className="text-zinc-500 text-xs">連接雲端中...</div>
        </div>
      </div>
    );
  }

  const ctx = {
    expenses, members, settings, currentRate, refreshing, online,
    upsertExpense, deleteExpense, addMultipleExpenses,
    upsertMember, deleteMember, saveSettings, refreshRate,
  };

  return (
    <div className="h-screen w-full bg-black flex flex-col max-w-md mx-auto relative overflow-hidden">
      <div className="flex-1 overflow-y-auto pb-36">
        {tab === 'home' && <HomeTab {...ctx} setTab={setTab} />}
        {tab === 'records' && <RecordsTab {...ctx} />}
        {tab === 'scan' && <ScanTab {...ctx} onDone={() => setTab('records')} />}
        {tab === 'stats' && <StatsTab {...ctx} />}
        {tab === 'settings' && <SettingsTab {...ctx} />}
      </div>
      <BottomNav tab={tab} setTab={setTab} />
    </div>
  );
}

// ========== BottomNav ==========
function BottomNav({ tab, setTab }) {
  const items = [
    { id: 'home', icon: IconHome, label: '首頁' },
    { id: 'records', icon: IconList, label: '紀錄' },
    { id: 'scan', icon: IconCamera, label: '掃描', center: true },
    { id: 'stats', icon: IconChart, label: '統計' },
    { id: 'settings', icon: IconSettings, label: '設定' },
  ];
  return (
    <div className="absolute bottom-0 left-0 right-0 bg-zinc-950 border-t border-zinc-900 flex justify-around items-center py-2 safe-bottom z-40">
      {items.map(it => {
        const IconEl = it.icon;
        const active = tab === it.id;
        if (it.center) {
          return (
            <button key={it.id} onClick={() => setTab(it.id)}
              className="relative -mt-6 w-14 h-14 bg-gradient-to-br from-orange-400 to-orange-600 rounded-full flex items-center justify-center shadow-lg shadow-orange-500/30">
              <IconEl className="w-6 h-6 text-white" />
            </button>
          );
        }
        return (
          <button key={it.id} onClick={() => setTab(it.id)} className="flex flex-col items-center gap-0.5 px-3 py-1">
            <IconEl className={`w-5 h-5 ${active ? 'text-orange-500' : 'text-zinc-500'}`} />
            <span className={`text-[10px] ${active ? 'text-orange-500 font-medium' : 'text-zinc-500'}`}>{it.label}</span>
          </button>
        );
      })}
    </div>
  );
}

// ========== MemberAvatar ==========
function MemberAvatar({ member, size = 40, ring = false }) {
  if (!member) return <div className="rounded-full bg-zinc-800 flex-shrink-0 flex items-center justify-center text-zinc-600" style={{ width: size, height: size }}>👤</div>;
  if (member.avatar) return <img src={member.avatar} alt={member.name} className={`rounded-full object-cover flex-shrink-0 ${ring ? 'ring-2 ring-orange-500' : ''}`} style={{ width: size, height: size }} />;
  const initial = member.name?.[0] || '?';
  return <div className={`rounded-full flex-shrink-0 flex items-center justify-center text-white font-bold ${ring ? 'ring-2 ring-orange-500' : ''}`} style={{ width: size, height: size, backgroundColor: member.color || '#FF8C00', fontSize: size * 0.4 }}>{initial}</div>;
}

// ========== ExpenseCard ==========
function ExpenseCard({ expense, members, settings, currentRate, onClick }) {
  const cat = CATEGORIES.find(c => c.id === expense.category);
  const paidBy = members.find(m => m.id === expense.paidBy);
  const splitMembers = (expense.splitAmong || []).map(id => members.find(m => m.id === id)).filter(Boolean);
  return (
    <button onClick={onClick} className="w-full bg-zinc-950 border border-zinc-900 rounded-2xl p-3 flex items-center gap-3 text-left">
      <div className="w-10 h-10 rounded-xl flex items-center justify-center text-lg flex-shrink-0" style={{ backgroundColor: cat?.color + '20' }}>{cat?.emoji}</div>
      <div className="flex-1 min-w-0">
        <div className="text-white font-medium truncate text-sm">{expense.name}</div>
        <div className="flex items-center gap-1.5 mt-0.5">
          {paidBy && <><MemberAvatar member={paidBy} size={16} /><span className="text-xs text-zinc-500 truncate">{paidBy.name}</span></>}
          {splitMembers.length > 0 && splitMembers.length !== members.length && (<><span className="text-xs text-zinc-600">·</span><span className="text-xs text-zinc-500">分 {splitMembers.length} 人</span></>)}
          {expense.location && (<><span className="text-xs text-zinc-600">·</span><span className="text-xs text-zinc-500 truncate">{expense.location}</span></>)}
        </div>
      </div>
      <div className="text-right flex-shrink-0">
        <div className="text-white font-bold">{formatMoney(expense.amount, settings.fromCurrency)}</div>
        <div className="text-[10px] text-zinc-500">{formatMoney(convert(expense.amount, currentRate), settings.toCurrency)}</div>
      </div>
    </button>
  );
}

// ========== HomeTab ==========

  const dayNum = Math.max(1, Math.floor((new Date() - startDate) / (1000 * 60 * 60 * 24)) + 1);
  const balances = calculateBalances(expenses, members);
  const transfers = simplifyTransfers(balances);

        </div>
        <div className="text-white">

// ========== RecordsTab ==========
function RecordsTab({ expenses, upsertExpense, deleteExpense, members, settings, currentRate }) {
  const [view, setView] = useState('date');
  const [showAdd, setShowAdd] = useState(false);
  const [editExpense, setEditExpense] = useState(null);
  const total = expenses.reduce((s, e) => s + e.amount, 0);

  const grouped = {};
  expenses.forEach(e => { if (!grouped[e.date]) grouped[e.date] = []; grouped[e.date].push(e); });
  const sortedDates = Object.keys(grouped).sort().reverse();

  const byCategory = {};
  expenses.forEach(e => { if (!byCategory[e.category]) byCategory[e.category] = { items: [], total: 0 }; byCategory[e.category].items.push(e); byCategory[e.category].total += e.amount; });

  const handleDelete = (id) => { if (confirm('確定刪除？')) deleteExpense(id); };

  return (
    <div className="px-5 safe-top pt-4 pb-4 space-y-4">
      <div className="flex items-center justify-between">
        <div>
          <h1 className="text-3xl font-bold text-white">所有消費</h1>
          <p className="text-xs text-zinc-500 mt-1">{expenses.length} 筆 · {formatMoney(total, settings.fromCurrency)} · ≈ {formatMoney(convert(total, currentRate), settings.toCurrency)}</p>
        </div>
        <button onClick={() => setShowAdd(true)} className="w-11 h-11 bg-gradient-to-br from-orange-400 to-orange-600 text-white rounded-full flex items-center justify-center shadow-lg shadow-orange-500/20"><IconPlus className="w-5 h-5" /></button>
      </div>

      <div className="bg-zinc-950 border border-zinc-900 rounded-xl p-1 flex">
        <button onClick={() => setView('date')} className={`flex-1 py-2 rounded-lg text-sm ${view === 'date' ? 'bg-orange-500 text-white font-medium' : 'text-zinc-500'}`}>按日期</button>
        <button onClick={() => setView('category')} className={`flex-1 py-2 rounded-lg text-sm ${view === 'category' ? 'bg-orange-500 text-white font-medium' : 'text-zinc-500'}`}>按類別</button>
      </div>

      {expenses.length === 0 && (
        <div className="bg-zinc-950 border border-zinc-900 rounded-2xl p-8 text-center">
          <div className="text-4xl mb-2">📝</div>
          <div className="text-zinc-500 text-sm mb-3">還沒有任何記錄</div>
          <button onClick={() => setShowAdd(true)} className="text-orange-500 font-medium text-sm">+ 新增一筆</button>
        </div>
      )}

      {view === 'date' && sortedDates.map(date => {
        const items = grouped[date];
        const dayTotal = items.reduce((s, e) => s + e.amount, 0);
        const dObj = new Date(date);
        const dow = ['日','一','二','三','四','五','六'][dObj.getDay()];
        return (
          <div key={date} className="space-y-2">
            <div className="flex justify-between items-baseline px-1">
              <div className="text-sm font-medium text-zinc-300">{date}（{dow}）</div>
              <div className="text-xs text-zinc-500">{formatMoney(dayTotal, settings.fromCurrency)}</div>
            </div>
            {items.map(e => <ExpenseCard key={e.id} expense={e} members={members} settings={settings} currentRate={currentRate} onClick={() => setEditExpense(e)} />)}
          </div>
        );
      })}

      {view === 'category' && Object.keys(byCategory).map(catId => {
        const cat = CATEGORIES.find(c => c.id === catId);
        const { items, total: catTotal } = byCategory[catId];
        return (
          <div key={catId} className="space-y-2">
            <div className="flex justify-between items-baseline px-1">
              <div className="text-sm font-medium flex items-center gap-2" style={{ color: cat?.color }}><span>{cat?.emoji}</span> {cat?.name}</div>
              <div className="text-xs text-zinc-500">{formatMoney(catTotal, settings.fromCurrency)}</div>
            </div>
            {items.map(e => <ExpenseCard key={e.id} expense={e} members={members} settings={settings} currentRate={currentRate} onClick={() => setEditExpense(e)} />)}
          </div>
        );
      })}

      {(showAdd || editExpense) && (
        <ExpenseEditor
          expense={editExpense}
          members={members}
          settings={settings}
          onDelete={editExpense ? () => { handleDelete(editExpense.id); setEditExpense(null); } : null}
          onClose={() => { setShowAdd(false); setEditExpense(null); }}
          onSave={(data) => {
            if (editExpense) upsertExpense({ ...editExpense, ...data });
            else upsertExpense(data);
            setShowAdd(false); setEditExpense(null);
          }}
        />
      )}
    </div>
  );
}

// ========== ExpenseEditor ==========

  return <div className="space-y-2"><label className="block text-xs text-zinc-500 uppercase tracking-wider">{label}</label>{children}</div>;
}

function ExpenseEditor({ expense, members, settings, onClose, onSave, onDelete }) {
  const [name, setName] = useState(expense?.name || '');
  const [amount, setAmount] = useState(expense?.amount?.toString() || '');
  const [category, setCategory] = useState(expense?.category || 'food');
  const [paymentMethod, setPaymentMethod] = useState(expense?.paymentMethod || 'cash');
  const [paidBy, setPaidBy] = useState(expense?.paidBy || members[0]?.id || '');
  const [splitAmong, setSplitAmong] = useState(expense?.splitAmong || members.map(m => m.id));
  const [location, setLocation] = useState(expense?.location || '');
  const [date, setDate] = useState(expense?.date || new Date().toISOString().split('T')[0]);

  const toggleSplit = (id) => setSplitAmong(s => s.includes(id) ? s.filter(x => x !== id) : [...s, id]);

  const handleSave = () => {

    if (members.length > 0 && splitAmong.length === 0) { alert('請選擇至少一個分擔者'); return; }

          <DarkField label={`金額（${settings.fromCurrency}）`}>
            <div className="relative">
              <span className="absolute left-4 top-1/2 -translate-y-1/2 text-zinc-500 text-xl">{getCurrencySymbol(settings.fromCurrency)}</span>

                  <span className="text-lg">{c.emoji}</span><span className="text-[10px]">{c.name}</span>
                </button>

        </div>

    </div>
  );

// ========== ScanTab ==========
function ScanTab({ addMultipleExpenses, members, settings, onDone }) {
  const [image, setImage] = useState(null);
  const [loading, setLoading] = useState(false);
  const [result, setResult] = useState(null);
  const [error, setError] = useState('');
  const [apiKey, setApiKey] = useState(() => localStorage.getItem('gemini_api_key') || '');
  const [showApiKey, setShowApiKey] = useState(false);
  const fileRef = useRef(null);

  const handleFile = (file) => {
    if (!file) return;
    const r = new FileReader();
    r.onload = () => { setImage(r.result); setResult(null); setError(''); };
    r.readAsDataURL(file);
  };

  const analyzeReceipt = async () => {
    if (!image) return;
    if (!apiKey) { setShowApiKey(true); return; }
    setLoading(true); setError('');
    try {
      const base64 = image.split(',')[1];
      const mediaType = image.match(/data:(.*?);/)[1];
      const prompt = "你係收據辨識助手。分析呢張收據，只輸出 JSON（唔好有 markdown 代碼標記）：\n\n{\n  \"store\": \"商店名稱（繁體中文，日文店名可以保留）\",\n  \"date\": \"YYYY-MM-DD（睇唔到就用今日）\",\n  \"items\": [\n    { \"name\": \"商品名（繁中）\", \"price\": 單價數字, \"qty\": 數量, \"category\": \"food|transport|shopping|accommodation|ticket|medicine|other\" }\n  ]\n}\n\n重要：\n- 如果一樣嘢買咗多件，qty 就係件數，price 係單價\n- 只提取明細嘅商品，唔好包含「小計」「合計」「稅」\n- 類別：food=餐飲, transport=交通, shopping=購物, accommodation=酒店, ticket=門票, medicine=藥品, other=其他";

      const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [{
            parts: [
              { inline_data: { mime_type: mediaType, data: base64 } },
              { text: prompt }
            ]
          }],
          generationConfig: { temperature: 0.1, maxOutputTokens: 2000 }
        })
      });
      const data = await response.json();
      if (!response.ok) throw new Error(data.error?.message || '辨識失敗');
      const text = data.candidates?.[0]?.content?.parts?.[0]?.text || '';
      const clean = text.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(clean);
      const expanded = [];
      parsed.items.forEach(it => {
        const qty = it.qty || 1;
        for (let i = 0; i < qty; i++) {
          expanded.push({
            ...it, qty: 1, _id: Math.random().toString(36).slice(2),
            paidBy: members[0]?.id || '',
            splitAmong: members.map(m => m.id),
            _originalQty: qty, _itemIdx: i + 1,
          });
        }
      });
      setResult({ store: parsed.store, date: parsed.date, items: expanded });
    } catch (e) {
      setError('辨識失敗：' + e.message);
    }
    setLoading(false);
  };

  const updateItem = (id, patch) => setResult(r => ({ ...r, items: r.items.map(it => it._id === id ? { ...it, ...patch } : it) }));
  const deleteItem = (id) => setResult(r => ({ ...r, items: r.items.filter(it => it._id !== id) }));

  const confirmSave = () => {
    if (!result || !result.items.length) return;
    const newExpenses = result.items.map((item) => ({
      name: item.name, amount: item.price, category: item.category || 'other',
      paymentMethod: 'cash', paidBy: item.paidBy, splitAmong: item.splitAmong,
      location: result.store, date: result.date || new Date().toISOString().split('T')[0],
    }));
    addMultipleExpenses(newExpenses);
    setImage(null); setResult(null); onDone();
  };

  const totalResult = result?.items.reduce((s, i) => s + i.price, 0) || 0;

  return (

function StatsTab({ expenses, settings, members, currentRate }) {
  const total = expenses.reduce((s, e) => s + e.amount, 0);
  const byCategory = {};
  expenses.forEach(e => { byCategory[e.category] = (byCategory[e.category] || 0) + e.amount; });
  const balances = calculateBalances(expenses, members);
  const memberSpent = {};
  members.forEach(m => memberSpent[m.id] = 0);
  expenses.forEach(exp => {
    if (!exp.splitAmong?.length) return;
    const per = exp.amount / exp.splitAmong.length;
    exp.splitAmong.forEach(id => { memberSpent[id] = (memberSpent[id] || 0) + per; });
  });
  const top10 = [...expenses].sort((a, b) => b.amount - a.amount).slice(0, 10);

  return (
    <div className="px-5 safe-top pt-4 pb-4 space-y-4">
      <h1 className="text-3xl font-bold text-white">統計</h1>
      <div className="bg-gradient-to-br from-orange-500 to-orange-700 rounded-3xl p-5 shadow-lg shadow-orange-500/20">
        <div className="text-white/80 text-xs uppercase tracking-wider">旅程總支出</div>
        <div className="text-white text-4xl font-bold mt-1">{formatMoney(total, settings.fromCurrency)}</div>
        <div className="text-white/80 text-sm mt-1">≈ {formatMoney(convert(total, currentRate), settings.toCurrency)}</div>
      </div>
      <div className="bg-zinc-950 border border-zinc-900 rounded-3xl p-5">
        <h2 className="text-sm font-medium text-zinc-400 uppercase tracking-wider mb-4">分類支出</h2>
        <DonutChart data={CATEGORIES.map(c => ({ label: c.name, value: byCategory[c.id] || 0, color: c.color, emoji: c.emoji })).filter(d => d.value > 0)} total={total} settings={settings} />
      </div>
      {members.length > 0 && (
        <div className="bg-zinc-950 border border-zinc-900 rounded-3xl p-5">
          <h2 className="text-sm font-medium text-zinc-400 uppercase tracking-wider mb-4">每人應負擔</h2>
          <div className="space-y-3">
            {members.map(m => {
              const spent = memberSpent[m.id] || 0;
              const bal = balances[m.id] || 0;
              const pct = total > 0 ? (spent / total) * 100 : 0;
              return (
                <div key={m.id} className="flex items-center gap-3">
                  <MemberAvatar member={m} size={40} />
                  <div className="flex-1 min-w-0">
                    <div className="flex justify-between items-baseline mb-1">
                      <span className="text-white font-medium text-sm">{m.name}</span>
                      <span className="text-white text-sm font-bold">{formatMoney(spent, settings.fromCurrency)}</span>
                    </div>
                    <div className="h-2 bg-zinc-900 rounded-full overflow-hidden mb-1"><div className="h-full bg-gradient-to-r from-orange-400 to-orange-600 rounded-full" style={{ width: `${pct}%` }} /></div>
                    <div className="flex justify-between text-[10px]">
                      <span className="text-zinc-500">{pct.toFixed(0)}%</span>
                      <span className={bal > 0.01 ? 'text-green-400' : bal < -0.01 ? 'text-red-400' : 'text-zinc-500'}>
                        {bal > 0.01 ? `應收 ${formatMoney(bal, settings.fromCurrency)}` : bal < -0.01 ? `應付 ${formatMoney(-bal, settings.fromCurrency)}` : '平衡'}
                      </span>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
      <div className="bg-zinc-950 border border-zinc-900 rounded-3xl p-5">
        <h2 className="text-sm font-medium text-zinc-400 uppercase tracking-wider mb-3">花費前十名</h2>
        {top10.length === 0 ? <div className="text-zinc-500 text-sm text-center py-4">暫無數據</div> : (
          <div className="space-y-2">
            {top10.map((e, idx) => {
              const cat = CATEGORIES.find(c => c.id === e.category);
              return (
                <div key={e.id} className="flex items-center gap-3 py-1.5">
                  <div className={`w-6 h-6 rounded-full flex items-center justify-center text-xs flex-shrink-0 ${idx < 3 ? 'bg-orange-500 text-white font-bold' : 'bg-zinc-900 text-zinc-500'}`}>{idx + 1}</div>
                  <span className="text-sm">{cat?.emoji}</span>
                  <div className="flex-1 min-w-0 truncate text-white text-sm">{e.name}</div>
                  <div className="text-right flex-shrink-0"><div className="text-white font-bold text-sm">{formatMoney(e.amount, settings.fromCurrency)}</div></div>
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}

function DonutChart({ data, total, settings }) {
  if (data.length === 0 || total === 0) return <div className="text-center py-6 text-zinc-500 text-sm">暫無數據</div>;
  const size = 160, sw = 24, r = (size - sw) / 2, c = 2 * Math.PI * r, cx = size / 2;
  let acc = 0;
  const segs = data.map(d => {
    const pct = d.value / total, len = c * pct, off = c * (acc / total); acc += d.value;
    return { ...d, len, off, pct };
  });
  return (
    <div className="flex items-center gap-4">
      <div className="relative flex-shrink-0">
        <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
          {segs.map((s, i) => (<circle key={i} cx={cx} cy={cx} r={r} fill="none" stroke={s.color} strokeWidth={sw} strokeDasharray={`${s.len} ${c}`} strokeDashoffset={-s.off} transform={`rotate(-90 ${cx} ${cx})`} />))}
        </svg>
        <div className="absolute inset-0 flex flex-col items-center justify-center">
          <div className="text-[10px] text-zinc-500">TOTAL</div>
          <div className="text-white text-sm font-bold">{formatMoney(total, settings.fromCurrency, true)}</div>
        </div>
      </div>
      <div className="flex-1 space-y-1">
        {segs.map((s, i) => (
          <div key={i} className="flex items-center gap-2 text-xs">
            <div className="w-2 h-2 rounded-full flex-shrink-0" style={{ backgroundColor: s.color }} />
            <span className="text-zinc-300 flex-1">{s.label}</span>
            <span className="text-zinc-500 text-[10px]">{(s.pct * 100).toFixed(0)}%</span>
            <span className="text-white font-medium w-14 text-right">{formatMoney(s.value, settings.fromCurrency, true)}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

function MemberEditor({ member, onClose, onSave }) {
  const [name, setName] = useState(member?.name || '');
  const [avatar, setAvatar] = useState(member?.avatar || '');
  const [color, setColor] = useState(member?.color || '#FF8C00');
  const fileRef = useRef(null);
  const colors = ['#FF8C00', '#EF4444', '#8B5CF6', '#06B6D4', '#10B981', '#EC4899', '#F59E0B', '#6366F1'];

  const handleAvatar = (file) => {
    if (!file) return;
    const r = new FileReader();
    r.onload = () => {
      const img = new Image();
      img.onload = () => {
        const canvas = document.createElement('canvas');
        const max = 240;
        const size = Math.min(img.width, img.height);
        const sx = (img.width - size) / 2;
        const sy = (img.height - size) / 2;
        canvas.width = max; canvas.height = max;
        canvas.getContext('2d').drawImage(img, sx, sy, size, size, 0, 0, max, max);
        setAvatar(canvas.toDataURL('image/jpeg', 0.75));
      };
      img.src = r.result;
    };
    r.readAsDataURL(file);
  };

  const handleSave = () => {
    if (!name.trim()) { alert('請輸入名字'); return; }
    onSave({ name: name.trim(), avatar, color });
  };

  return (
    <div className="fixed inset-0 bg-black/80 z-50 flex items-end backdrop-blur-sm" onClick={onClose}>
      <div className="bg-zinc-900 w-full rounded-t-3xl p-5 border-t border-zinc-800 safe-bottom" onClick={e => e.stopPropagation()}>
        <div className="flex justify-between items-center mb-5">
          <h2 className="text-xl font-bold text-white">{member ? '編輯旅伴' : '新增旅伴'}</h2>
          <button onClick={onClose} className="w-8 h-8 rounded-full bg-zinc-800 flex items-center justify-center"><IconX className="w-4 h-4 text-zinc-400" /></button>
        </div>
        <div className="space-y-4">
          <div className="flex justify-center">
            <button onClick={() => fileRef.current?.click()} className="relative">
              {avatar ? (
                <img src={avatar} className="w-24 h-24 rounded-full object-cover ring-4 ring-zinc-800" alt="" />
              ) : (
                <div className="w-24 h-24 rounded-full flex items-center justify-center text-4xl font-bold text-white ring-4 ring-zinc-800" style={{ backgroundColor: color }}>{name[0] || '?'}</div>
              )}
              <div className="absolute bottom-0 right-0 w-8 h-8 bg-orange-500 rounded-full flex items-center justify-center shadow-lg"><IconCamera className="w-4 h-4 text-white" /></div>
            </button>
            <input ref={fileRef} type="file" accept="image/*" onChange={e => handleAvatar(e.target.files?.[0])} className="hidden" />
          </div>
          <p className="text-center text-[10px] text-zinc-500">點擊更換頭像</p>
          <DarkField label="名字"><input value={name} onChange={e => setName(e.target.value)} placeholder="例如：Ricky" className="w-full px-4 py-3 bg-zinc-800 text-white rounded-xl outline-none focus:ring-2 ring-orange-500" /></DarkField>
          {!avatar && (
            <DarkField label="顏色">
              <div className="flex gap-2 flex-wrap">
                {colors.map(c => <button key={c} onClick={() => setColor(c)} className={`w-9 h-9 rounded-full ${color === c ? 'ring-2 ring-white scale-110' : ''}`} style={{ backgroundColor: c }} />)}
              </div>
            </DarkField>
          )}
          {avatar && <button onClick={() => setAvatar('')} className="w-full py-2 text-sm text-zinc-400 bg-zinc-800 rounded-xl">移除頭像</button>}
          <button onClick={handleSave} className="w-full py-4 bg-gradient-to-br from-orange-400 to-orange-600 text-white font-bold rounded-2xl shadow-lg shadow-orange-500/20">儲存</button>
        </div>
      </div>
    </div>
  );
}

// ========== 啟動 ==========
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);
</script>
</body>
</html>
